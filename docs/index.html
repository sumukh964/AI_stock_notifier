<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Stock Signals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #f8f6ff;
  color: #2d2a3a;
  padding: 40px 20px;
  max-width: 800px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.alert {
  padding: 16px;
  margin-bottom: 15px;
  border-radius: 10px;
  background: white;
  border-left: 5px solid #ccc;
}

.rise { border-color: #4ade80; }
.fall { border-color: #f87171; }
.neutral { border-color: #facc15; }

.small {
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<h1>📊 AI Stock Alerts</h1>

<div id="alerts">Loading...</div>

<script>
fetch("alerts.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("alerts");
    container.innerHTML = "";

    if (!data.length) {
      container.innerHTML = "No alerts available";
      return;
    }

    data.forEach(a => {
      let cls = "neutral";
      if (a.prediction === "RISE") cls = "rise";
      if (a.prediction === "FALL") cls = "fall";

      const div = document.createElement("div");
      div.className = "alert " + cls;

      div.innerHTML = `
        <b>${a.company}</b><br>
        ${a.prediction} (${a.confidence}%)<br>
        ${a.reason}<br>
        <span class="small">${a.time}</span>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
