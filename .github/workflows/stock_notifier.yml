name: AI Stock Intelligence — Daily Run

on:
  schedule:
    # 7:30 AM IST = 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  stock-analysis:
    name: Run AI Pre-Market Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit alerts.json back to repo

    env:
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      BOT_TOKEN:    ${{ secrets.BOT_TOKEN }}
      CHAT_ID:      ${{ secrets.CHAT_ID }}

    steps:
      - name: ⬇ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧠 Download spaCy language model
        run: python -m spacy download en_core_web_sm

      - name: 🚀 Run AI Stock Intelligence System
        run: python news_fetcher.py

      - name: 💾 Commit updated signal log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/alerts.json
          git diff --staged --quiet || git commit -m "chore: update signal log $(date +'%Y-%m-%d') [skip ci]"
          git push
